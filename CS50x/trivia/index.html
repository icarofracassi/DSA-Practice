<!DOCTYPE html>

<html lang="en">
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
        <link href="styles.css" rel="stylesheet">
        <title>Trivia!</title>
        <script>
            function checkAnswer(event) {
                let button = event.target;
                let input;

                if (button.id == "free") {
                    input = button.parentElement.querySelector('input');
                }

                if (button.id == "1-1" || input.value == "SAP") {
                    button.style.backgroundColor = 'Green';
                    button.parentElement.querySelector('.feedback').innerHTML = "Correct";
                } else {
                    button.style.backgroundColor = 'Red';
                    button.parentElement.querySelector('.feedback').innerHTML = "Incorrect";
                }

            }
            // TODO: Add code to check answers to questions
        </script>
    </head>
    <body>
        <div class="header">
            <h1>Trivia!</h1>
        </div>

        <div class="container">
            <div class="section">
                <h2>Part 1: Multiple Choice </h2>
                <hr>
                <h3>Has Icaro been loving this CS50x course?</h3>
                <!-- TODO: Add multiple choice question here -->
                <button type="button" class="button" id="1-1" onclick="checkAnswer(event)">Yes</button>
                <button type="button" class="button" id="1-2" onclick="checkAnswer(event)">Kinda</button>
                <button type="button" class="button" id="1-3" onclick="checkAnswer(event)">No</button>
                <p class="feedback"></p>
            </div>

            <div class="section">
                <h2>Part 2: Free Response</h2>
                <hr>
                <h3>What is the most valuable tech company in europe in 2025?</h3>
                <input type="text" id="freetext"></input>
                <button onclick="checkAnswer(event)" id="free">Go</button>
                <p class="feedback"></p>
            </div>
        </div>
    </body>
</html>
