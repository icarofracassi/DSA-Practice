{% extends "layout.html" %}

{% block title %}
    Cart
{% endblock %}

{% block main %}
    <form action="/cart" method="post">
        <div class="mb-3">
            <input autocomplete="off" autofocus class="form-control mx-auto w-auto" name="amount" placeholder="R$10,00" type="number" min="10">
        </div>
        <button class="btn btn-primary" type="submit">Add to wallet</button>
    </form>
{% endblock %}
